<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8""")/>>
<meta name="viewport" content="width=device-width, initial-scale=1.0""")/>>
<title>Hybrid Training Plan</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0a; color: white; font-family: sans-serif; padding: 20px; }
  .day-card { border: 1px solid #333; margin-bottom: 20px; padding: 15px; border-radius: 8px; background: #111; }
  h2 { color: #4ade80; margin-bottom: 10px; }
  ul { list-style: none; margin-top: 10px; }
  li { margin-bottom: 8px; font-size: 0.9rem; color: #ccc; }
  strong { color: #fff; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const plan = [
  {
    day: "Day 1", label: "Lower — Quad / Knee Dominant", type: "strength",
    cardio: "10 min incline walk warm-up",
    mobility: "Hip flexor stretch 2x45s / Ankle circles / Leg swings",
    exercises: [
      { name: "Heel-Elevated Goblet Squat", sets: "3", reps: "10–12", note: "Slow 4s eccentric, full depth" },
      { name: "Bulgarian Split Squat", sets: "3", reps: "8–10 ea.", note: "Drive through front heel" }
    ],
  },
  {
    day: "Day 2", label: "Upper — Push / Horizontal", type: "strength",
    cardio: "15 min easy row",
    mobility: "Thoracic rotation / Banded circles",
    exercises: [
      { name: "Incline DB Press", sets: "4", reps: "8–10", note: "Control the descent" }
    ],
  }
  // ... Add your other days here following this exact quote format
];

function App() {
  return (
    <div>
      <h1>My Hybrid Training Plan</h1>
      {plan.map((item, idx) => (
        <div key={idx} className="day-card">
          <h2>{item.day}: {item.label}</h2>
          <p><strong>Cardio:</strong> {item.cardio}</p>
          <p><strong>Mobility:</strong> {item.mobility}</p>
          <ul>
            {item.exercises.map((ex, i) => (
              <li key={i}><strong>{ex.name}</strong> - {ex.sets}x{ex.reps} <br/> <em>{ex.note}</em></li>
            ))}
          </ul>
        </div>
      ))}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
