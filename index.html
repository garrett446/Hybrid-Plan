<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7-Day Hybrid Training Plan</title>
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0a0a0a; color: #e5e5e5; font-family: sans-serif; line-height: 1.6; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: #4ade80; text-align: center; margin-bottom: 30px; text-transform: uppercase; }
        .day-card { background: #171717; border: 1px solid #333; border-radius: 12px; padding: 20px; margin-bottom: 25px; }
        .day-title { color: #4ade80; font-size: 1.4rem; border-bottom: 2px solid #4ade80; margin-bottom: 15px; padding-bottom: 5px; }
        .section-title { color: #fbbf24; font-size: 0.9rem; font-weight: bold; margin-top: 15px; text-transform: uppercase; }
        .exercise-item { background: #262626; margin-bottom: 10px; padding: 12px; border-radius: 6px; border-left: 4px solid #4ade80; }
        .ex-name { font-weight: bold; color: #fff; display: block; }
        .ex-meta { font-size: 0.85rem; color: #4ade80; font-weight: bold; }
        .ex-note { font-size: 0.85rem; color: #a3a3a3; font-style: italic; display: block; margin-top: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const plan = [
            { day: "Day 1", label: "Lower — Quad Dominant", cardio: "10 min incline walk", mobility: "Hip/Ankle circles", exercises: [{ name: "Heel-Elevated Goblet Squat", sets: "3", reps: "10–12", note: "Slow 4s eccentric" }, { name: "Bulgarian Split Squat", sets: "3", reps: "8–10 ea.", note: "Drive through front heel" }] },
            { day: "Day 2", label: "Upper — Push", cardio: "15 min easy row", mobility: "Shoulder circles", exercises: [{ name: "Incline DB Press", sets: "4", reps: "8–10", note: "Control the descent" }, { name: "Lateral Raise", sets: "3", reps: "15-20", note: "No momentum" }] },
            { day: "Day 3", label: "Cardio + Mobility", cardio: "30 min rowing", mobility: "Full body session", exercises: [{ name: "Row Intervals", sets: "8", reps: "2:00", note: "1:00 rest between" }, { name: "90/90 Hip Stretch", sets: "2", reps: "60s", note: "Breathe deeply" }] },
            { day: "Day 4", label: "Lower — Hip Dominant", cardio: "10 min walk", mobility: "Hamstring flossing", exercises: [{ name: "Romanian Deadlift", sets: "4", reps: "8–10", note: "Hinge at hips" }, { name: "Hip Thrust", sets: "3", reps: "10-12", note: "Squeeze glutes" }] },
            { day: "Day 5", label: "Upper — Pull", cardio: "15 min row", mobility: "Lat stretch", exercises: [{ name: "Pull-Up / Lat Pulldown", sets: "4", reps: "6–12", note: "Lead with elbows" }, { name: "Hammer Curl", sets: "2", reps: "12 ea.", note: "Elbow health" }] },
            { day: "Day 6", label: "Full Body Pump", cardio: "10 min row finisher", mobility: "Body flow", exercises: [{ name: "Goblet Squat to Press", sets: "3", reps: "10", note: "Full body drive" }, { name: "Pallof Press", sets: "3", reps: "12 ea.", note: "Anti-rotation" }] },
            { day: "Day 7", label: "Rest & Active Recovery", cardio: "20 min light walk or stretch", mobility: "Focus on tight areas", exercises: [{ name: "Light Stretching", sets: "1", reps: "15 min", note: "Keep it easy" }] }
        ];

        function App() {
            return (
                <div className="container">
                    <h1>7-Day Training Plan</h1>
                    {plan.map((day, idx) => (
                        <div key={idx} className="day-card">
                            <div className="day-title">{day.day}: {day.label}</div>
                            <div className="section-title">Prep</div>
                            <p>🏃 {day.cardio} | 🧘 {day.mobility}</p>
                            <div className="section-title">Work</div>
                            {day.exercises.map((ex, i) => (
                                <div key={i} className="exercise-item">
                                    <span className="ex-name">{ex.name}</span>
                                    <span className="ex-meta">{ex.sets}x{ex.reps}</span>
                                    <span className="ex-note">{ex.note}</span>
                                </div>
                            ))}
                        </div>
                    ))}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
